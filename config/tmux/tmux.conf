# Prefix
set -g prefix C-b
bind C-b send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5
bind -n TripleClick1Pane resize-pane -Z

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Pickers and popups (fzf via bash functions)
bind s display-popup -E -w 70% -h 60% "bash -ic tp"
bind w display-popup -E -w 50% -h 40% "bash -ic twp"
bind j display-popup -E -w 70% -h 50% "bash -ic tj"
bind ` display-popup -E -w 80% -h 75% -d "#{pane_current_path}"

# AI popup
bind a display-popup -E -w 80% -h 75% -d "#{pane_current_path}" "claude"

# Git popups
bind g display-popup -E -w 80% -h 70% -d "#{pane_current_path}" -T " git log " \
  "git log --oneline --graph --decorate --color=always -50 | less -R"
bind G display-popup -E -w 60% -h 50% -d "#{pane_current_path}" -T " worktrees " \
  'wt=$(git worktree list 2>/dev/null | fzf --reverse --header="switch worktree" | awk "{print \$1}") && [ -n "$wt" ] && tmux send-keys -t "#{pane_id}" "cd \"$wt\"" Enter'
bind b display-popup -E -w 60% -h 50% -d "#{pane_current_path}" -T " branches " \
  'branch=$(git branch -a --color=always --sort=-committerdate | fzf --ansi --reverse --header="checkout branch" | sed "s/^[* ]*//" | sed "s|remotes/origin/||" | xargs) && [ -n "$branch" ] && tmux send-keys -t "#{pane_id}" "git checkout \"$branch\"" Enter'

# Mesh (Tailscale device hub)
bind m display-popup -E -w 80% -h 60% "bash -ic mesh"

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
set -g popup-style "bg=default"
set -g popup-border-style "fg=blue"
setw -g clock-mode-colour blue

# Nested tmux toggle (F12)
# Press F12 to send all keys to inner/remote tmux session
# Press F12 again to take back local control
# Status bar dims when in pass-through mode
bind -T root F12 \
  set prefix None \;\
  set prefix2 None \;\
  set key-table off \;\
  set status-style "bg=red,fg=white" \;\
  set status-left "#[fg=white,bg=red,bold] #S #[bg=default] " \;\
  set status-right "#[fg=white,bg=red,bold] REMOTE #[bg=default] #[fg=brightblack]#h " \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u prefix2 \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  set -u status-right \;\
  refresh-client -S
