add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status${custom.worktree}]($style)$character"

[character]
error_symbol = "[✗](bold #e68e0d)"
success_symbol = "[❯](bold #e68e0d)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold #e68e0d"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #5f9ea0"

[git_status]
format     = '[$all_status]($style)'
style      = "#bebebe"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[custom.worktree]
command = "echo 'wt'"
when = "test -f .git"
format = "[$output]($style) "
style = "#8a8a8d"
